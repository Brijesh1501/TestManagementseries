<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCLEX TMS — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center p-4">

  <!-- Background orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute top-1/3 -right-40 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-40 left-1/3 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/40 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">NCLEX TMS</h1>
      <p class="text-slate-400 text-sm mt-1">Test Management System</p>
    </div>

    <!-- Card -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">
      <!-- Tabs -->
      <div class="flex bg-white/10 rounded-2xl p-1 mb-8">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all bg-white text-indigo-700 shadow-sm">
          Sign In
        </button>
        <button id="tab-register" onclick="switchTab('register')"
          class="flex-1 py-2.5 text-sm font-semibold rounded-xl transition-all text-white/70 hover:text-white">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1.5">Email Address</label>
            <input id="login-email" type="email" placeholder="you@example.com"
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1.5">Password</label>
            <div class="relative">
              <input id="login-password" type="password" placeholder="••••••••"
                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all text-sm" />
              <button onclick="togglePassword('login-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/70 transition-colors text-lg">👁</button>
            </div>
          </div>
          <button onclick="handleLogin()"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-all shadow-lg shadow-indigo-500/30 flex items-center justify-center gap-2 group">
            <span id="login-btn-text">Sign In</span>
            <span id="login-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          </button>
        </div>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1.5">Full Name</label>
            <input id="reg-name" type="text" placeholder="John Doe"
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1.5">Email Address</label>
            <input id="reg-email" type="email" placeholder="you@example.com"
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all text-sm" />
          </div>
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1.5">Password</label>
            <div class="relative">
              <input id="reg-password" type="password" placeholder="Min 8 characters"
                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all text-sm" />
              <button onclick="togglePassword('reg-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/70 transition-colors text-lg">👁</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1.5">Confirm Password</label>
            <input id="reg-confirm" type="password" placeholder="Repeat password"
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all text-sm" />
          </div>
          <button onclick="handleRegister()"
            class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-all shadow-lg shadow-indigo-500/30 flex items-center justify-center gap-2">
            <span id="reg-btn-text">Create Account</span>
            <span id="reg-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
          </button>
        </div>
      </div>

      <p class="text-center text-white/40 text-xs mt-6">
        By continuing, you agree to our Terms of Service and Privacy Policy.
      </p>
    </div>

    <!-- Admin hint -->
    <p class="text-center text-white/30 text-xs mt-4">
      Admin? <a href="admin/index.html" class="text-indigo-400 hover:text-indigo-300 underline transition-colors">Admin Panel →</a>
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#dc2626;color:#fff;text-align:center;font-size:13px;font-weight:600;padding:10px 16px;';
        banner.innerHTML = '⚠️ Supabase not configured! Open <code style="background:#991b1b;padding:2px 6px;border-radius:4px;">js/config.js</code> and replace YOUR_PROJECT_ID and YOUR_ANON_KEY with your real Supabase credentials.';
        document.body.prepend(banner);
      }
    });
  </script>
</body>
</html>

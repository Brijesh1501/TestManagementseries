<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supabase Debug — NCLEX TMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen p-6 text-white font-mono text-sm">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-1">🔍 Supabase Debug Panel v4</h1>
    <p class="text-slate-400 text-xs mb-6">Full error details shown. Open browser Console (F12) too.</p>

    <div id="log" class="space-y-1.5 mb-6 max-h-96 overflow-y-auto"></div>

    <div class="grid grid-cols-2 gap-3 mb-4">
      <button onclick="testTables()"   class="px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold text-sm">1. Check Tables</button>
      <button onclick="createTables()" class="px-4 py-3 bg-green-600  hover:bg-green-500  rounded-xl font-bold text-sm">2. CREATE Tables Now</button>
      <button onclick="testSignUp()"   class="px-4 py-3 bg-yellow-500 hover:bg-yellow-400 rounded-xl font-bold text-sm text-black">3. Test Sign Up</button>
      <button onclick="testSignIn()"   class="px-4 py-3 bg-blue-600   hover:bg-blue-500   rounded-xl font-bold text-sm">4. Test Sign In</button>
      <button onclick="checkAuth()"    class="px-4 py-3 bg-purple-600 hover:bg-purple-500 rounded-xl font-bold text-sm">5. Check Auth Settings</button>
      <button onclick="clearLog()"     class="px-4 py-3 bg-slate-700  hover:bg-slate-600  rounded-xl font-bold text-sm">Clear</button>
    </div>

    <div class="bg-slate-800 rounded-xl p-4 mb-4">
      <p class="text-slate-400 text-xs mb-2 font-bold">TEST CREDENTIALS:</p>
      <input id="test-email"    type="email" value="testuser999@gmail.com"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm mb-2" />
      <input id="test-password" type="text"  value="TestPass@123"
        class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white text-sm" />
    </div>
    <a href="index.html" class="text-indigo-400 text-xs underline">← Back to Login</a>
  </div>

<script>
const _URL = 'https://clvqomxagijowwvpkyzb.supabase.co';
const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsdnFvbXhhZ2lqb3d3dnBreXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzk2MTEsImV4cCI6MjA5MDg1NTYxMX0.gf4zj3TdSCscH-6wqGdH5SBjdyMrOHPXytToubGyikw';
const _db  = window.supabase.createClient(_URL, _KEY);

function log(msg, type='info') {
  const c = {info:'text-blue-300',ok:'text-green-400',error:'text-red-400',warn:'text-yellow-300',data:'text-slate-300'};
  const i = {info:'ℹ',ok:'✅',error:'❌',warn:'⚠️',data:'📦'};
  const el = document.createElement('div');
  el.className = `flex gap-2 ${c[type]} bg-slate-800/80 rounded-lg px-3 py-2 border border-slate-700`;
  el.innerHTML = `<span class="flex-shrink-0 text-base">${i[type]}</span><pre class="break-all whitespace-pre-wrap text-xs flex-1">${String(msg)}</pre>`;
  document.getElementById('log').appendChild(el);
  el.scrollIntoView({behavior:'smooth'});
  console.log(`[${type}]`, msg);
}
function clearLog() { document.getElementById('log').innerHTML=''; }

// ── 1. CHECK TABLES ──────────────────────────────────────────
async function testTables() {
  clearLog();
  log('Checking 8 required tables…');
  const tables = ['profiles','test_series','questions','test_attempts','attempt_answers','bookmarks','notifications','system_settings'];
  let missing = [];
  for (const t of tables) {
    const { count, error } = await _db.from(t).select('*',{count:'exact',head:true});
    if (error) {
      log(`${t}: MISSING — code=${error.code} msg="${error.message}"`, 'error');
      missing.push(t);
    } else {
      log(`${t}: ✅ exists (${count??0} rows)`, 'ok');
    }
  }
  if (missing.length > 0) {
    log(`\n${missing.length} tables missing: ${missing.join(', ')}`, 'warn');
    log('→ Click "2. CREATE Tables Now" to auto-create them via JS', 'warn');
  } else {
    log('All 8 tables exist! Ready to register.', 'ok');
  }
}

// ── 2. CREATE TABLES VIA JS (FALLBACK) ───────────────────────
async function createTables() {
  clearLog();
  log('Attempting to create tables via Supabase RPC…');
  log('NOTE: This requires the SQL function to exist. If it fails, use the SQL Editor manually.', 'warn');

  // Test if we can even write to the DB
  log('\nTesting direct insert to check permissions…');

  // Try to create profiles table using rpc exec_sql if available
  const { data, error } = await _db.rpc('exec_sql', {
    sql: `SELECT 'test'`
  });

  if (error) {
    log('exec_sql RPC not available: ' + error.message, 'warn');
    log('You MUST use Supabase SQL Editor to create tables.', 'warn');
    log('\n=== DIRECT SQL EDITOR LINK ===', 'data');
    log('https://supabase.com/dashboard/project/clvqomxagijowwvpkyzb/sql/new', 'data');
    log('\nPaste STEP1_TABLES_ONLY.sql content there and click RUN', 'data');
    showSQLInstructions();
  } else {
    log('exec_sql available!', 'ok');
  }
}

function showSQLInstructions() {
  const box = document.createElement('div');
  box.className = 'mt-4 bg-slate-800 border border-yellow-500 rounded-xl p-4';
  box.innerHTML = `
    <p class="text-yellow-400 font-bold text-sm mb-3">⚠️ Tables are NOT being created. Here's why and how to fix:</p>
    <p class="text-slate-300 text-xs mb-2"><strong class="text-white">The Problem:</strong> The SQL script is failing silently in Supabase SQL Editor.</p>
    <p class="text-slate-300 text-xs mb-3"><strong class="text-white">The Fix:</strong> Run each CREATE TABLE statement <em>one at a time</em>:</p>
    <ol class="text-xs text-slate-300 space-y-1 list-decimal list-inside mb-4">
      <li>Go to Supabase SQL Editor</li>
      <li>Paste <strong class="text-yellow-300">ONLY the profiles table SQL</strong> below and click Run</li>
      <li>Then paste the next table, and so on</li>
    </ol>
    <div class="bg-slate-900 rounded-lg p-3 text-xs text-green-300 font-mono overflow-x-auto mb-3">
CREATE TABLE IF NOT EXISTS profiles (
  id         UUID PRIMARY KEY REFERENCES auth.users(id) ON DELETE CASCADE,
  full_name  TEXT NOT NULL DEFAULT 'User',
  email      TEXT NOT NULL UNIQUE,
  role       TEXT NOT NULL DEFAULT 'student',
  is_active  BOOLEAN DEFAULT TRUE,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  updated_at TIMESTAMPTZ DEFAULT NOW()
);</div>
    <p class="text-slate-400 text-xs">After this works, run STEP1_TABLES_ONLY.sql one table at a time.</p>
  `;
  document.getElementById('log').appendChild(box);
}

// ── 3. TEST SIGN UP ──────────────────────────────────────────
async function testSignUp() {
  const email    = document.getElementById('test-email').value.trim();
  const password = document.getElementById('test-password').value.trim();
  log(`Testing signUp → ${email}`);

  const { data, error } = await _db.auth.signUp({
    email, password,
    options: { data: { full_name: 'Test User', role: 'student' } }
  });

  if (error) {
    log(`signUp FAILED`, 'error');
    log(`  message : ${error.message}`, 'error');
    log(`  status  : ${error.status}`, 'error');
    log(`  code    : ${error.code || 'none'}`, 'error');
    log(`  name    : ${error.name || 'none'}`, 'error');
    console.error('Full error object:', JSON.stringify(error, null, 2));

    if (error.message?.includes('Database error')) {
      log('\nROOT CAUSE: The "profiles" table does not exist.', 'warn');
      log('The auth.users trigger fires but cannot insert into profiles.', 'warn');
      log('FIX: Run STEP1_TABLES_ONLY.sql in Supabase SQL Editor first!', 'warn');
      log('URL: https://supabase.com/dashboard/project/clvqomxagijowwvpkyzb/sql/new', 'data');
    }
  } else {
    log(`signUp response OK`, 'ok');
    log(`  user.id : ${data?.user?.id}`, 'ok');
    log(`  session : ${data?.session ? 'YES ✅' : 'NO — email confirmation ON ⚠️'}`, data?.session ? 'ok' : 'warn');
    if (!data?.session) {
      log('Disable email confirmation: Supabase → Auth → Settings → Email → OFF', 'warn');
    }
  }
}

// ── 4. TEST SIGN IN ──────────────────────────────────────────
async function testSignIn() {
  const email    = document.getElementById('test-email').value.trim();
  const password = document.getElementById('test-password').value.trim();
  log(`Testing signIn → ${email}`);
  const { data, error } = await _db.auth.signInWithPassword({ email, password });
  if (error) {
    log(`signIn FAILED: ${error.message} [${error.status}]`, 'error');
  } else {
    log(`signIn SUCCESS — user: ${data.user?.email}`, 'ok');
  }
}

// ── 5. CHECK AUTH SETTINGS ───────────────────────────────────
async function checkAuth() {
  clearLog();
  log('Checking Supabase Auth configuration…');
  log('Supabase Auth settings cannot be read via JS — check manually:', 'warn');
  log('1. Go to: https://supabase.com/dashboard/project/clvqomxagijowwvpkyzb/auth/providers', 'data');
  log('2. Click "Email" provider', 'data');
  log('3. Make sure "Enable email confirmations" is TOGGLED OFF', 'data');
  log('4. Make sure "Enable Sign Ups" is TOGGLED ON', 'data');
  log('\nAlso check:', 'info');
  log('https://supabase.com/dashboard/project/clvqomxagijowwvpkyzb/auth/url-configuration', 'data');
  log('Site URL should be your Vercel URL', 'data');

  // Try a basic auth operation to see if auth works at all
  log('\nTesting auth service availability…');
  const { data, error } = await _db.auth.getSession();
  if (error) {
    log('Auth service error: ' + error.message, 'error');
  } else {
    log('Auth service: reachable ✅', 'ok');
    log('Current session: ' + (data.session ? data.session.user.email : 'none (not logged in)'), 'info');
  }
}

window.addEventListener('DOMContentLoaded', testTables);
</script>
</body>
</html>

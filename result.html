<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Result — NCLEX TMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Back -->
    <div class="mb-6">
      <a href="dashboard.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-700 text-sm font-medium transition-colors">
        ← Back to Dashboard
      </a>
    </div>

    <div id="result-container">
      <div class="flex items-center justify-center py-24">
        <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function init() {
      const session = await Auth.requireAuth();
      if (!session) return;

      const params = new URLSearchParams(window.location.search);
      const attemptId = params.get('attempt');
      if (!attemptId) return (window.location.href = 'dashboard.html');

      try {
        const { data: attempt, error: ae } = await supabase
          .from('test_attempts')
          .select('*, test_series(*)')
          .eq('id', attemptId)
          .single();
        if (ae) throw ae;

        const answers = await DB.getAttemptAnswers(attemptId);
        renderResult(attempt, answers);
      } catch (e) {
        document.getElementById('result-container').innerHTML = '<p class="text-center text-red-500 py-16">Failed to load result.</p>';
        console.error(e);
      }
    }

    function renderResult(attempt, answers) {
      const { score_percentage: score, correct_answers: correct, wrong_answers: wrong, skipped_answers: skipped,
              total_questions: total, time_taken_seconds: time, is_passed: passed, test_series: series } = attempt;

      document.getElementById('result-container').innerHTML = `
        <!-- Score Banner -->
        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm p-8 mb-6 text-center relative overflow-hidden">
          <div class="absolute inset-0 ${passed ? 'bg-gradient-to-br from-green-50 to-emerald-50' : 'bg-gradient-to-br from-red-50 to-rose-50'} opacity-50"></div>
          <div class="relative">
            <div class="inline-flex items-center justify-center w-24 h-24 rounded-full border-4 ${passed ? 'border-green-400 text-green-600' : 'border-red-400 text-red-600'} bg-white mb-4 shadow-lg">
              <span class="text-2xl font-black">${score?.toFixed(1)}%</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-1">${series?.title}</h1>
            <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-bold ${passed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
              ${passed ? '🎉 PASSED' : '❌ FAILED'}
            </span>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          ${[
            { icon: '✅', label: 'Correct', value: correct, color: 'green' },
            { icon: '❌', label: 'Wrong', value: wrong, color: 'red' },
            { icon: '⏭️', label: 'Skipped', value: skipped, color: 'yellow' },
            { icon: '⏱️', label: 'Time Taken', value: UI.formatDuration(time), color: 'blue' }
          ].map(s => `
          <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm text-center">
            <p class="text-2xl mb-1">${s.icon}</p>
            <p class="text-xl font-black text-slate-800">${s.value}</p>
            <p class="text-xs text-slate-500 mt-0.5">${s.label}</p>
          </div>`).join('')}
        </div>

        <!-- Chart + Actions -->
        <div class="grid lg:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col items-center justify-center">
            <canvas id="result-donut" width="200" height="200"></canvas>
          </div>
          <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm p-6 flex flex-col justify-center gap-4">
            <h3 class="font-bold text-slate-800">Quick Actions</h3>
            <a href="test.html?series=${series?.id}" class="flex items-center justify-between px-5 py-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl font-semibold text-sm transition-colors">
              🔁 Retake This Test <span>→</span>
            </a>
            <a href="tests.html" class="flex items-center justify-between px-5 py-3 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl font-semibold text-sm transition-colors">
              📝 Try Another Series <span>→</span>
            </a>
            <a href="performance.html" class="flex items-center justify-between px-5 py-3 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl font-semibold text-sm transition-colors">
              📊 View Performance <span>→</span>
            </a>
            <a href="dashboard.html" class="flex items-center justify-between px-5 py-3 bg-slate-50 hover:bg-slate-100 text-slate-700 rounded-xl font-semibold text-sm transition-colors">
              🏠 Go to Dashboard <span>→</span>
            </a>
          </div>
        </div>

        <!-- Detailed Review -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
          <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
            <h3 class="font-bold text-slate-800">Detailed Review</h3>
            <div class="flex gap-2">
              <button onclick="filterReview('all')" id="rv-all" class="text-xs px-3 py-1.5 rounded-lg bg-indigo-600 text-white font-medium">All</button>
              <button onclick="filterReview('wrong')" id="rv-wrong" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 font-medium hover:bg-slate-200">Wrong</button>
              <button onclick="filterReview('skipped')" id="rv-skipped" class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 font-medium hover:bg-slate-200">Skipped</button>
            </div>
          </div>
          <div id="review-list" class="divide-y divide-slate-100 max-h-screen overflow-y-auto"></div>
        </div>
      `;

      // Draw donut chart
      new Chart(document.getElementById('result-donut').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: ['Correct', 'Wrong', 'Skipped'],
          datasets: [{ data: [correct, wrong, skipped], backgroundColor: ['#22c55e', '#ef4444', '#f59e0b'], borderWidth: 0 }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } }, cutout: '65%' }
      });

      renderReview(answers, 'all');
    }

    let allAnswers = [];
    function renderReview(answers, filter) {
      if (answers) allAnswers = answers;
      let filtered = allAnswers;
      if (filter === 'wrong') filtered = allAnswers.filter(a => a.is_correct === false);
      if (filter === 'skipped') filtered = allAnswers.filter(a => a.is_skipped);

      document.querySelectorAll('[id^="rv-"]').forEach(b => { b.className = 'text-xs px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 font-medium hover:bg-slate-200'; });
      document.getElementById(`rv-${filter}`).className = 'text-xs px-3 py-1.5 rounded-lg bg-indigo-600 text-white font-medium';

      const container = document.getElementById('review-list');
      if (!filtered.length) { container.innerHTML = '<p class="text-center text-slate-400 py-8 text-sm">No items in this category.</p>'; return; }

      container.innerHTML = filtered.map((a, idx) => {
        const q = a.questions;
        const optLabels = { A: q.option_a, B: q.option_b, C: q.option_c, D: q.option_d };
        const statusIcon = a.is_correct ? '✅' : a.is_skipped ? '⏭️' : '❌';
        const statusBg = a.is_correct ? 'border-l-green-400' : a.is_skipped ? 'border-l-yellow-400' : 'border-l-red-400';

        return `
        <div class="px-6 py-5 border-l-4 ${statusBg}">
          <div class="flex items-start gap-3 mb-3">
            <span class="text-lg">${statusIcon}</span>
            <div class="flex-1">
              <span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-medium">Q${q.question_number || idx + 1}</span>
              <p class="text-sm font-medium text-slate-800 mt-1.5 leading-relaxed">${q.question_text}</p>
            </div>
          </div>
          <div class="ml-8 space-y-2">
            ${['A','B','C','D'].map(opt => {
              const isCorrect = opt === q.correct_answer;
              const isSelected = opt === a.selected_answer;
              let cls = 'bg-slate-50 text-slate-600 border-slate-200';
              if (isCorrect) cls = 'bg-green-50 text-green-700 border-green-300 font-semibold';
              if (isSelected && !isCorrect) cls = 'bg-red-50 text-red-700 border-red-300 line-through';
              return `<div class="flex items-center gap-2 text-xs px-3 py-2 rounded-lg border ${cls}">
                <span class="font-bold">${opt}.</span> ${optLabels[opt]}
                ${isCorrect ? '<span class="ml-auto text-green-600 text-xs font-bold">✓ Correct</span>' : ''}
                ${isSelected && !isCorrect ? '<span class="ml-auto text-red-500 text-xs">Your answer</span>' : ''}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');
    }

    window.filterReview = (f) => renderReview(null, f);
    init();
  </script>
</body>
</html>

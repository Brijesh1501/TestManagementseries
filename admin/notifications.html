<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Admin NCLEX TMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="bg-slate-100 min-h-screen">
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
    <div class="flex flex-col h-full">
      <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-800">
        <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center text-white font-black text-sm">A</div>
        <div><p class="text-white font-bold text-sm">NCLEX TMS</p><p class="text-red-400 text-xs font-semibold">Admin Panel</p></div>
      </div>
      <nav class="flex-1 px-4 py-4 space-y-1">
        <a href="index.html" class="sidebar-link">📊 Overview</a>
        <a href="users.html" class="sidebar-link">👥 Users</a>
        <a href="series.html" class="sidebar-link">📝 Test Series</a>
        <a href="questions.html" class="sidebar-link">❓ Questions</a>
        <a href="analytics.html" class="sidebar-link">📈 Analytics</a>
        <a href="notifications.html" class="sidebar-link active">🔔 Notifications</a>
        <a href="settings.html" class="sidebar-link">⚙️ Settings</a>
        <a href="seed.html" class="sidebar-link">🌱 Seed Data</a>
        <div class="pt-4 border-t border-slate-800 mt-4"><a href="../dashboard.html" class="sidebar-link text-slate-400">← Student View</a></div>
      </nav>
      <div class="px-4 py-4 border-t border-slate-800">
        <button onclick="handleLogout()" class="w-full px-4 py-2.5 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl text-sm font-medium text-left">Sign Out</button>
      </div>
    </div>
  </aside>

  <div class="lg:ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-20 bg-white border-b border-slate-200 px-4 lg:px-8 h-16 flex items-center justify-between shadow-sm">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-slate-100">☰</button>
      <h2 class="text-lg font-bold text-slate-800">Notifications</h2>
      <button onclick="document.getElementById('create-modal').classList.remove('hidden')" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm">+ Send Notification</button>
    </header>

    <main class="flex-1 px-4 lg:px-8 py-8">
      <div id="notif-container">
        <div class="flex items-center justify-center py-24">
          <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- Create Notification Modal -->
  <div id="create-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
      <h3 class="text-lg font-bold text-slate-800 mb-5">Send Notification</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">Title *</label>
          <input id="notif-title" type="text" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" placeholder="Notification title" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">Message *</label>
          <textarea id="notif-message" rows="3" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none" placeholder="Message content..."></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1.5">Type</label>
          <select id="notif-type" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
            <option value="info">Info</option>
            <option value="success">Success</option>
            <option value="warning">Warning</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div class="flex items-center gap-3">
          <input type="checkbox" id="notif-global" checked class="w-4 h-4 text-indigo-600 rounded" />
          <label for="notif-global" class="text-sm font-medium text-slate-600">Send to ALL users (global)</label>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="document.getElementById('create-modal').classList.add('hidden')" class="flex-1 py-2.5 border border-slate-300 text-slate-600 font-semibold rounded-xl hover:bg-slate-50 text-sm">Cancel</button>
        <button onclick="sendNotification()" class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm">Send</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script>
    async function init() {
      const result = await Auth.requireAdmin();
      if (!result) return;
      await loadNotifications();
    }

    async function loadNotifications() {
      const { data, error } = await supabase
        .from('notifications')
        .select('*')
        .order('created_at', { ascending: false });

      const container = document.getElementById('notif-container');
      if (!data?.length) { container.innerHTML = '<div class="text-center py-16 text-slate-400">No notifications yet.</div>'; return; }

      container.innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm divide-y divide-slate-100">
          ${data.map(n => {
            const typeColors = { info: 'bg-blue-100 text-blue-700', success: 'bg-green-100 text-green-700', warning: 'bg-yellow-100 text-yellow-700', error: 'bg-red-100 text-red-700' };
            return `
            <div class="flex items-start justify-between px-6 py-4 hover:bg-slate-50 transition-colors">
              <div class="flex-1 min-w-0 mr-4">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs font-bold px-2 py-0.5 rounded-full capitalize ${typeColors[n.type] || typeColors.info}">${n.type}</span>
                  ${n.is_global ? '<span class="text-xs bg-slate-100 text-slate-500 font-medium px-2 py-0.5 rounded-full">Global</span>' : ''}
                  <span class="text-xs text-slate-400">${UI.formatDate(n.created_at)}</span>
                </div>
                <p class="text-sm font-semibold text-slate-800">${n.title}</p>
                <p class="text-xs text-slate-500 mt-0.5">${n.message}</p>
              </div>
              <button onclick="deleteNotif('${n.id}', this.closest('.flex'))" class="text-red-400 hover:text-red-600 text-xs font-medium flex-shrink-0">Delete</button>
            </div>`;
          }).join('')}
        </div>`;
    }

    async function sendNotification() {
      const title = document.getElementById('notif-title').value.trim();
      const message = document.getElementById('notif-message').value.trim();
      const type = document.getElementById('notif-type').value;
      const is_global = document.getElementById('notif-global').checked;

      if (!title || !message) return UI.showToast('Title and message are required.', 'warning');

      const { error } = await supabase.from('notifications').insert({ title, message, type, is_global });
      if (error) return UI.showToast(error.message, 'error');
      UI.showToast('Notification sent!', 'success');
      document.getElementById('create-modal').classList.add('hidden');
      await loadNotifications();
    }

    async function deleteNotif(id, el) {
      await supabase.from('notifications').delete().eq('id', id);
      el?.remove();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }
    async function handleLogout() { await Auth.signOut(); window.location.href = '../index.html'; }
    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Test — NCLEX TMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- Loading -->
  <div id="loading-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
    <div class="w-14 h-14 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-white font-semibold text-lg">Loading Test...</p>
    <p id="load-status" class="text-slate-400 text-sm mt-1">Fetching questions</p>
  </div>

  <!-- Test UI -->
  <div id="test-container" class="hidden min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-4 lg:px-6 h-14 flex items-center justify-between sticky top-0 z-20 shadow-sm">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <div>
          <p id="test-title" class="font-bold text-slate-800 text-sm">Test Series</p>
          <p class="text-xs text-slate-500">Q <span id="q-current">1</span> of <span id="q-total">0</span></p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <!-- Timer -->
        <div id="timer-box" class="flex items-center gap-2 bg-slate-100 rounded-xl px-3 py-1.5">
          <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span id="timer-display" class="text-sm font-mono font-bold text-slate-700">60:00</span>
        </div>
        <button onclick="confirmSubmit()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition-colors">Submit Test</button>
      </div>
    </header>

    <!-- Progress Bar -->
    <div class="bg-white border-b border-slate-200 px-4 lg:px-6 py-2">
      <div class="flex items-center gap-3">
        <div class="flex-1 bg-slate-200 rounded-full h-2">
          <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
        </div>
        <span id="progress-text" class="text-xs text-slate-500 font-medium w-12 text-right">0%</span>
      </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
      <!-- Question Panel -->
      <main class="flex-1 overflow-y-auto p-4 lg:p-8">
        <div class="max-w-3xl mx-auto">
          <!-- Question Card -->
          <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 lg:p-8 mb-6">
            <div class="flex items-center gap-2 mb-4">
              <span class="text-xs bg-indigo-100 text-indigo-700 font-bold px-2.5 py-1 rounded-full">Q <span id="q-num">1</span></span>
              <button onclick="toggleBookmark()" id="bookmark-btn" class="text-slate-300 hover:text-yellow-500 transition-colors ml-auto text-xl">⭐</button>
            </div>
            <p id="question-text" class="text-slate-800 font-medium text-base lg:text-lg leading-relaxed mb-8"></p>

            <div class="space-y-3" id="options-container">
              <!-- Options rendered by JS -->
            </div>
          </div>

          <!-- Navigation -->
          <div class="flex items-center justify-between">
            <button onclick="prevQuestion()" class="px-5 py-2.5 border border-slate-300 text-slate-600 hover:bg-slate-50 font-semibold rounded-xl transition-colors text-sm flex items-center gap-2">
              ← Previous
            </button>
            <button onclick="skipQuestion()" class="px-5 py-2.5 border border-slate-300 text-slate-500 hover:bg-slate-50 font-semibold rounded-xl transition-colors text-sm">
              Skip
            </button>
            <button onclick="nextQuestion()" id="next-btn" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors text-sm flex items-center gap-2">
              Next →
            </button>
          </div>
        </div>
      </main>

      <!-- Question Grid Sidebar -->
      <aside class="hidden lg:flex flex-col w-64 bg-white border-l border-slate-200 overflow-y-auto">
        <div class="px-4 py-3 border-b border-slate-200">
          <p class="text-xs font-bold text-slate-600 uppercase tracking-wide">Question Navigator</p>
        </div>
        <div class="p-3 flex-1">
          <div id="q-grid" class="grid grid-cols-5 gap-1.5"></div>
        </div>
        <div class="px-4 py-3 border-t border-slate-200 space-y-1.5">
          <div class="flex items-center gap-2 text-xs text-slate-500"><span class="w-5 h-5 bg-indigo-600 rounded text-white flex items-center justify-center text-xs font-bold">•</span> Current</div>
          <div class="flex items-center gap-2 text-xs text-slate-500"><span class="w-5 h-5 bg-green-100 border border-green-300 rounded text-xs"></span> Answered</div>
          <div class="flex items-center gap-2 text-xs text-slate-500"><span class="w-5 h-5 bg-yellow-100 border border-yellow-300 rounded text-xs"></span> Skipped</div>
          <div class="flex items-center gap-2 text-xs text-slate-500"><span class="w-5 h-5 bg-slate-100 border border-slate-200 rounded text-xs"></span> Not visited</div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Submit Confirmation Modal -->
  <div id="submit-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm">
      <h3 class="text-lg font-bold text-slate-800 mb-2">Submit Test?</h3>
      <div id="submit-summary" class="text-sm text-slate-600 mb-6 space-y-1"></div>
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-2.5 border border-slate-300 text-slate-600 font-semibold rounded-xl hover:bg-slate-50 transition-colors">Continue</button>
        <button onclick="submitTest()" class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-colors">Submit</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/test.js"></script>
</body>
</html>
